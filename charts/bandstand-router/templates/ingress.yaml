{{- if .Values.ingress.enabled }}
{{- $subdomain := required "ingress.subdomain is required" .Values.ingress.subdomain -}}
{{- $domain := required "ingress.domain is required" .Values.ingress.domain -}}
{{- $host := printf "%s.%s.%s" $subdomain .Values.global.env $domain -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}
  labels: {{- include "bandstand-router.labels" . | nindent 4 }}
  annotations:
    bandstand.ktech.com/service-visibility: {{ .Values.ingress.visibility }}
    nginx.ingress.kubernetes.io/service-upstream: "true"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/server-snippet: |
      large_client_header_buffers 4 16k;
    {{- with .Values.ingress.annotations }}
      {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: nginx-{{ .Values.ingress.visibility }}
  tls:
    - hosts:
      - {{ $host | quote }}
      {{- range $.Values.additionalDomains }}
      - {{ . | quote }}
      {{- end }}
  rules:
    - host: {{ $host | quote }}
      http: &http_rules
        paths:
          - path: "/"
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.defaultBackend }}
                port:
                  number: 80
          {{- if .Values.ingress.authenticationBackend }}
          - path: "/authentication"
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingress.authenticationBackend }}
                port:
                  number: 80
          {{- end }}
          {{- if .Values.ingress.additionalPaths }}
            {{- toYaml .Values.ingress.additionalPaths | nindent 10 }}
          {{- end }}
    {{- range $.Values.additionalDomains}}
    - host: {{ . | quote }}
      http: *http_rules
    {{- end }}
{{- end }}
