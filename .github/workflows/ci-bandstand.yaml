name: Check Deployments - Bandstand

run-name: Check Bandstand Charts are Deployable

on:
  push:
    branches:
      - "**"
      - "main"

jobs:

  test-bandstand-chart:
    name: test run
    strategy:
      fail-fast: false
      # matrix:
        # environment: 
        #   - test
    uses: ktech-org/actions/.github/workflows/bandstand-deploy.yaml@v0
    secrets: inherit
    with:
      dry-run: true
      business: ktech
      environment: test
      namespace: lab
      values: test-charts/web-service/defaults/values.yaml
      chart: test-charts/web-service/defaults



