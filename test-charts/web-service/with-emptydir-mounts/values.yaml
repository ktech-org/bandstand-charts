bandstand-web-service:
  owner: ktech-developer-platform
  env: test
  business: ktech

  global:
    env: test
    business: ktech
    aws:
      account: "123456789012"
    dockerRegistry: ktechartifacts-docker.jfrog.io
    image:
      tag: latest
    releaseTags:
      backstageComponent: test-component
      backstageOwner: ktech-developer-platform

  ingress:
    enabled: false

  emptyDirMounts:
    - name: cache-dir
      mountPath: /app/cache
    - name: shared-memory
      mountPath: /dev/shm
      medium: Memory
      sizeLimit: 512Mi
    - name: scratch-space
      mountPath: /var/scratch
      sizeLimit: 1Gi
